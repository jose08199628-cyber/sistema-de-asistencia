<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia Sincronizado</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --primary: #0056b3; --bg-color: #f4f7f6; --text-color: #333; --border-color: #ccc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        header h1 { margin: 0 0 5px 0; font-size: 1.8rem; color: var(--primary); }
        .nube-status { font-size: 0.9rem; color: #28a745; font-weight: bold; margin-bottom: 15px; display: block; }
        .secciones-panel { display: flex; gap: 10px; background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .secciones-panel select, .secciones-panel input[type="text"] { padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); }
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .config-box, .import-box { background: #f8f9fa; border: 1px solid var(--border-color); padding: 15px; border-radius: 5px; }
        .config-box h3, .import-box h3 { margin-top: 0; font-size: 1.1rem; color: var(--primary); }
        .config-box input[type="number"] { width: 80px; padding: 5px; font-weight: bold; text-align: center; }
        textarea { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; resize: vertical; margin-bottom: 10px; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; background-color: var(--primary); color: white; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #004494; }
        .btn-danger { background-color: #dc3545; }
        .btn-success { background-color: #28a745; }
        .btn-warning { background-color: #ffc107; color: #212529; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; }
        th { background-color: var(--primary); color: white; }
        td input[type="number"] { width: 45px; padding: 4px; text-align: center; border: 1px solid transparent; }
        td input[type="text"] { width: 180px; padding: 4px; border: none; background: transparent; }
        .status-green { color: #155724; background-color: #d4edda; font-weight: bold; }
        .status-yellow { color: #856404; background-color: #fff3cd; font-weight: bold; }
        .status-red { color: #721c24; background-color: #f8d7da; font-weight: bold; }
        #loading { text-align: center; font-size: 1.2rem; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Control de Asistencia General</h1>
        <span class="nube-status">☁️ Sincronizado en la nube</span>
        <div class="secciones-panel">
            <strong>Sección actual:</strong>
            <select id="selectorSecciones" onchange="cambiarSeccion()"></select>
            <span style="margin-left: 20px;"><strong>Añadir curso:</strong></span>
            <input type="text" id="nuevaSeccionNombre" placeholder="Ej. 5to Grado B">
            <button onclick="crearSeccion()">+ Crear</button>
            <button class="btn-danger" style="margin-left:auto;" onclick="eliminarSeccion()">Eliminar Sección Actual</button>
        </div>
    </header>

    <div id="loading">Conectando con la base de datos...</div>

    <div id="app-content" style="display: none;">
        <div class="tools-grid">
            <div class="config-box">
                <h3>Días Laborados</h3>
                <input type="number" id="totalDiasGlobal" min="1" onchange="actualizarDiasGlobales()">
            </div>
            <div class="import-box">
                <h3>Carga Rápida de Estudiantes</h3>
                <textarea id="textoListaNombres" rows="2" placeholder="Pega los nombres aquí..."></textarea>
                <button class="btn-success" onclick="procesarListaNombres()">Registrar Lista</button>
            </div>
        </div>

        <div class="controls">
            <button onclick="agregarEstudianteIndividual()">+ Añadir Estudiante</button>
            <button class="btn-warning" onclick="exportarCSV()">Exportar CSV</button>
        </div>

        <div class="table-responsive">
            <table id="tablaAsistencia">
                <thead><tr><th>Nombre</th><th>Ago</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dic</th><th>Ene</th><th>Feb</th><th>Mar</th><th>Abr</th><th>May</th><th>Jun</th><th>Total</th><th>% Asistencia</th><th>X</th></tr></thead>
                <tbody id="tbodyAsistencia"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrxKdXSdj1x8euLrU2tK5x8qNFIN4B1Go",
        authDomain: "asistencia-3d5e1.firebaseapp.com",
        projectId: "asistencia-3d5e1",
        storageBucket: "asistencia-3d5e1.firebasestorage.app",
        messagingSenderId: "1085603282006",
        appId: "1:1085603282006:web:eadae7c550880169198ff7",
        measurementId: "G-LKQ22LDGXW"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const meses = ['ago', 'sep', 'oct', 'nov', 'dic', 'ene', 'feb', 'mar', 'abr', 'may', 'jun'];
    let datosApp = {}, seccionActiva = null;

    db.collection("escuela").doc("asistencia").onSnapshot((doc) => {
        if (doc.exists) {
            let info = doc.data();
            datosApp = info.datosApp || {};
            seccionActiva = info.seccionActiva || Object.keys(datosApp)[0];
        } else {
            datosApp = {"4to Grado": { dias: 179, estudiantes: [] }};
            seccionActiva = "4to Grado";
            guardarDatos();
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        actualizarInterfaz();
    });

    function guardarDatos() {
        db.collection("escuela").doc("asistencia").set({ datosApp, seccionActiva });
    }

    function actualizarInterfaz() {
        const selector = document.getElementById('selectorSecciones');
        selector.innerHTML = '';
        Object.keys(datosApp).forEach(n => {
            let opt = document.createElement('option');
            opt.value = n; opt.text = n;
            if (n === seccionActiva) opt.selected = true;
            selector.appendChild(opt);
        });
        document.getElementById('totalDiasGlobal').value = datosApp[seccionActiva].dias;
        renderizarTabla();
    }

    function cambiarSeccion() { seccionActiva = document.getElementById('selectorSecciones').value; guardarDatos(); }
    
    function crearSeccion() {
        let n = document.getElementById('nuevaSeccionNombre').value.trim();
        if (n && !datosApp[n]) { datosApp[n] = { dias: 179, estudiantes: [] }; seccionActiva = n; guardarDatos(); }
    }

    function eliminarSeccion() {
        if (Object.keys(datosApp).length > 1) { delete datosApp[seccionActiva]; seccionActiva = Object.keys(datosApp)[0]; guardarDatos(); }
    }

    function actualizarDiasGlobales() { datosApp[seccionActiva].dias = parseInt(document.getElementById('totalDiasGlobal').value); guardarDatos(); }

    function procesarListaNombres() {
        let texto = document.getElementById('textoListaNombres').value;
        texto.split('\n').forEach(n => { if (n.trim()) datosApp[seccionActiva].estudiantes.push({ id: Date.now() + Math.random(), nombre: n.trim(), ...Object.fromEntries(meses.map(m => [m, 0])) }); });
        guardarDatos();
    }

    function agregarEstudianteIndividual() { datosApp[seccionActiva].estudiantes.push({ id: Date.now() + Math.random(), nombre: "Nuevo", ...Object.fromEntries(meses.map(m => [m, 0])) }); guardarDatos(); }

    function eliminarEstudiante(id) { datosApp[seccionActiva].estudiantes = datosApp[seccionActiva].estudiantes.filter(e => e.id !== id); guardarDatos(); }

    function actualizarDato(id, campo, valor) {
        let e = datosApp[seccionActiva].estudiantes.find(x => x.id === id);
        if (campo === 'nombre') e[campo] = valor; else e[campo] = parseInt(valor) || 0;
        guardarDatos();
    }

    function renderizarTabla() {
        const tbody = document.getElementById('tbodyAsistencia'); tbody.innerHTML = '';
        datosApp[seccionActiva].estudiantes.forEach(e => {
            let total = meses.reduce((s, m) => s + (e[m] || 0), 0);
            let pct = Math.round((total / datosApp[seccionActiva].dias) * 100);
            let tr = document.createElement('tr');
            tr.innerHTML = `<td><input type="text" value="${e.nombre}" onchange="actualizarDato(${e.id}, 'nombre', this.value)"></td>` + 
                           meses.map(m => `<td><input type="number" value="${e[m]}" onchange="actualizarDato(${e.id}, '${m}', this.value)"></td>`).join('') +
                           `<td><strong>${total}</strong></td><td class="${pct < 80 ? 'status-red' : pct < 90 ? 'status-yellow' : 'status-green'}">${pct}%</td>
                           <td><button class="btn-danger" onclick="eliminarEstudiante(${e.id})">X</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function exportarCSV() {
        let csv = "Nombre," + meses.join(",") + ",Total,Porcentaje\n";
        datosApp[seccionActiva].estudiantes.forEach(e => {
            let total = meses.reduce((s, m) => s + (e[m] || 0), 0);
            csv += `${e.nombre},${meses.map(m => e[m]).join(",")},${total},${Math.round((total/datosApp[seccionActiva].dias)*100)}%\n`;
        });
        const link = document.createElement("a"); link.href = "data:text/csv;charset=utf-8," + encodeURI(csv); link.download = "asistencia.csv"; link.click();
    }
</script>
</body>
</html>
