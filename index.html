<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia Profesional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .panel { display: flex; gap: 10px; background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #0056b3; color: white; }
        input { width: 100%; border: none; background: transparent; text-align: center; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; background: #0056b3; color: white; font-weight: bold; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <strong>Sección:</strong>
        <select id="selectorSecciones" onchange="cambiarSeccionLocal()"></select>
        <input type="text" id="nuevoCurso" placeholder="Nombre nuevo curso" style="width: 150px; background: white; border: 1px solid #ccc; padding: 5px;">
        <button onclick="crearCurso()">+ Crear Curso</button>
    </div>
    
    <textarea id="listaNombres" placeholder="Pega lista de nombres aquí (uno por línea)..." style="width:100%; height:60px;"></textarea>
    <button class="btn-success" onclick="cargarLista()" style="margin-bottom: 10px;">Cargar Lista Masiva</button>

    <table id="tabla">
        <thead><tr><th>Nombre</th><th>Ago</th><th>Sep</th><th>Oct</th><th>Nov</th><th>Dic</th><th>Ene</th><th>Feb</th><th>Mar</th><th>Abr</th><th>May</th><th>Jun</th><th>Total</th><th>%</th><th>X</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <button onclick="agregarFila()">+ Agregar Estudiante Individual</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrxKdXSdj1x8euLrU2tK5x8qNFIN4B1Go",
        authDomain: "asistencia-3d5e1.firebaseapp.com",
        projectId: "asistencia-3d5e1",
        storageBucket: "asistencia-3d5e1.firebasestorage.app",
        messagingSenderId: "1085603282006",
        appId: "1:1085603282006:web:eadae7c550880169198ff7",
        measurementId: "G-LKQ22LDGXW"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const meses = ['ago', 'sep', 'oct', 'nov', 'dic', 'ene', 'feb', 'mar', 'abr', 'may', 'jun'];
    let cursos = {};
    let miSeccion = localStorage.getItem('mi_seccion_local') || "";

    db.collection("escuela").doc("datos_cursos").onSnapshot((doc) => {
        if (doc.exists) {
            cursos = doc.data().cursos || {};
        } else {
            // Si la base está vacía, creamos la estructura inicial
            cursos = { "Ejemplo": { dias: 179, estudiantes: [] } };
            db.collection("escuela").doc("datos_cursos").set({ cursos: cursos });
        }
        if(!miSeccion || !cursos[miSeccion]) miSeccion = Object.keys(cursos)[0];
        renderizar();
    });

    function renderizar() {
        const sel = document.getElementById('selectorSecciones');
        sel.innerHTML = Object.keys(cursos).map(n => `<option value="${n}" ${n === miSeccion ? 'selected':''}>${n}</option>`).join('');
        
        if(!cursos[miSeccion]) return;
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = cursos[miSeccion].estudiantes.map(e => `
            <tr>
                <td><input type="text" value="${e.nombre}" onchange="actualizar('${e.id}', 'nombre', this.value)"></td>
                ${meses.map(m => `<td><input type="number" value="${e[m] || 0}" onchange="actualizar('${e.id}', '${m}', this.value)"></td>`).join('')}
                <td>${meses.reduce((s, m) => s + (parseInt(e[m]) || 0), 0)}</td>
                <td>${Math.round((meses.reduce((s, m) => s + (parseInt(e[m]) || 0), 0) / (cursos[miSeccion].dias || 179)) * 100)}%</td>
                <td><button class="btn-danger" onclick="eliminar('${e.id}')">X</button></td>
            </tr>
        `).join('');
    }

    function cambiarSeccionLocal() { miSeccion = document.getElementById('selectorSecciones').value; localStorage.setItem('mi_seccion_local', miSeccion); renderizar(); }

    function crearCurso() {
        let nombre = document.getElementById('nuevoCurso').value.trim();
        if(nombre && !cursos[nombre]) {
            cursos[nombre] = { dias: 179, estudiantes: [] };
            db.collection("escuela").doc("datos_cursos").set({ cursos: cursos }); // Usamos set para asegurar creación
            document.getElementById('nuevoCurso').value = '';
        }
    }

    function cargarLista() {
        let nombres = document.getElementById('listaNombres').value.split('\n');
        nombres.forEach(n => { if(n.trim()) cursos[miSeccion].estudiantes.push({ id: Date.now()+Math.random(), nombre: n.trim(), ...Object.fromEntries(meses.map(m=>[m,0])) }); });
        db.collection("escuela").doc("datos_cursos").set({ cursos: cursos });
    }

    function actualizar(id, campo, valor) {
        let e = cursos[miSeccion].estudiantes.find(x => x.id == id);
        e[campo] = campo == 'nombre' ? valor : parseInt(valor) || 0;
        db.collection("escuela").doc("datos_cursos").set({ cursos: cursos });
    }

    function agregarFila() { cursos[miSeccion].estudiantes.push({ id: Date.now()+Math.random(), nombre: "Nuevo", ...Object.fromEntries(meses.map(m=>[m,0])) }); db.collection("escuela").doc("datos_cursos").set({ cursos: cursos }); }

    function eliminar(id) { cursos[miSeccion].estudiantes = cursos[miSeccion].estudiantes.filter(e => e.id != id); db.collection("escuela").doc("datos_cursos").set({ cursos: cursos }); }
</script>
</body>
</html>
